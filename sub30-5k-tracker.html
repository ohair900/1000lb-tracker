<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f8f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sub-30 5K">
<title>Sub-30 5K Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f8f6; --ink:#14181c; --muted:#6b7280; --line:#dfe3de;
    --base:#2f7d4f; --build:#c77414; --peak:#c2372e; --race:#1f4fa3;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.5;
    padding:0 16px 64px; max-width:560px; margin:0 auto;
  }
  .cond{font-family:'Barlow Condensed',sans-serif}
  header{padding:32px 0 8px}
  .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:14px;color:var(--muted)}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:50px;line-height:.95;margin:6px 0 14px}
  h1 .goal{color:var(--race)}

  .progress-card{background:#fff;border:1.5px solid var(--ink);border-radius:12px;padding:14px 16px;margin-bottom:6px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .progress-top .big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px}
  .progress-top .small{font-size:13px;color:var(--muted)}
  .bar{height:10px;background:#eceee9;border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;width:0;background:linear-gradient(90deg,#2f7d4f,#c77414,#c2372e,#1f4fa3);border-radius:5px;transition:width .4s ease}
  .reset{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0;margin-bottom:14px;font-family:inherit}

  .phase{display:flex;align-items:baseline;gap:10px;margin:26px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--ph)}
  .phase h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;text-transform:uppercase;letter-spacing:.03em;color:var(--ph)}
  .phase span{font-size:12px;color:var(--muted)}

  .week{background:#fff;border:1.5px solid var(--line);border-left:6px solid var(--ph);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .week.recovery{background:#f1f3ef;border-style:dashed;border-left-style:solid}
  .week.complete{border-color:var(--ph);opacity:.85}
  .week-head{width:100%;background:none;border:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;gap:12px;text-align:left;font-family:inherit;font-size:inherit;color:inherit}
  .week-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:32px;line-height:1;color:var(--ph);min-width:44px}
  .week-info{flex:1}
  .week-title{font-weight:600;font-size:14px}
  .rec-tag{margin-left:8px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ph)}
  .week-sub{display:block;font-size:12px;color:var(--muted)}
  .chev{color:var(--muted);font-size:13px}
  .runs{padding:0 14px 12px;display:none}
  .week.open .runs{display:block}

  .run{width:100%;display:flex;align-items:flex-start;gap:12px;padding:10px 12px;margin-bottom:6px;border-radius:8px;border:1px solid #e5e7e2;background:#fafbf9;cursor:pointer;text-align:left;font-family:inherit;font-size:inherit;color:inherit}
  .run.milestone{border:2px solid var(--ph);background:#fff}
  .run.checked{background:#eef2ec}
  .box{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid #b8bdb4;background:#fff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-top:1px}
  .run.checked .box{border-color:var(--ph);background:var(--ph)}
  .run-tag{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .run.milestone .run-tag{color:var(--ph)}
  .run-desc{font-size:14px}
  .run.checked .run-desc{text-decoration:line-through;color:var(--muted)}

  .paces{display:flex;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden;background:#fff;margin-top:28px}
  .paces div{flex:1;padding:10px 8px;text-align:center}
  .paces div+div{border-left:1.5px solid var(--ink)}
  .paces .num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;line-height:1}
  .paces .lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
  .footnote{font-size:12px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>

<header>
  <div class="eyebrow">12-week plan · 4 runs / week</div>
  <h1>40:00 → <span class="goal">SUB-30</span> 5K</h1>
</header>

<div class="progress-card">
  <div class="progress-top">
    <span class="big" id="count">0 / 47 runs</span>
    <span class="small" id="pct">0% · on week 1</span>
  </div>
  <div class="bar"><div class="bar-fill" id="fill"></div></div>
</div>
<button class="reset" onclick="resetAll()">Reset progress</button>

<div id="plan"></div>

<div class="paces">
  <div><div class="num">11:30+</div><div class="lbl">Easy / long</div></div>
  <div><div class="num">10:00</div><div class="lbl">Tempo</div></div>
  <div><div class="num">9:39</div><div class="lbl">Goal pace</div></div>
</div>

<p class="footnote">Easy means conversational — if you can't talk, slow down. Warm up 5–10 min before intervals. Sharp pain gets 2–3 days off.</p>

<script>
const PHASES = [
  { id:"base",  name:"Phase 1 · Base",  note:"get comfortable running longer",  color:"var(--base)",  weeks:[1,2,3,4] },
  { id:"build", name:"Phase 2 · Build", note:"longer reps, first tempo work",   color:"var(--build)", weeks:[5,6,7,8] },
  { id:"peak",  name:"Phase 3 · Peak",  note:"goal-pace miles + time trial",    color:"var(--peak)",  weeks:[9,10,11] },
  { id:"race",  name:"Race Week",       note:"half volume, fresh legs",         color:"var(--race)",  weeks:[12] },
];

const PLAN = {
  1:{recovery:false,runs:[
    {id:"w1r1",tag:"Easy",desc:"20–25 min conversational"},
    {id:"w1r2",tag:"Intervals",desc:"6 × 400m @ 9:00/mi · 90s rest"},
    {id:"w1r3",tag:"Easy",desc:"20–25 min conversational"},
    {id:"w1r4",tag:"Long run",desc:"3.0 mi slow"}]},
  2:{recovery:false,runs:[
    {id:"w2r1",tag:"Easy",desc:"20–25 min conversational"},
    {id:"w2r2",tag:"Intervals",desc:"7 × 400m @ 9:00/mi · 90s rest"},
    {id:"w2r3",tag:"Easy",desc:"20–25 min conversational"},
    {id:"w2r4",tag:"Long run",desc:"3.5 mi slow"}]},
  3:{recovery:false,runs:[
    {id:"w3r1",tag:"Easy",desc:"25 min conversational"},
    {id:"w3r2",tag:"Intervals",desc:"8 × 400m @ 9:00/mi · 90s rest"},
    {id:"w3r3",tag:"Easy",desc:"25 min conversational"},
    {id:"w3r4",tag:"Long run",desc:"4.0 mi slow"}]},
  4:{recovery:true,runs:[
    {id:"w4r1",tag:"Easy",desc:"20 min, extra gentle"},
    {id:"w4r2",tag:"Intervals",desc:"6 × 400m · easy week"},
    {id:"w4r3",tag:"Easy",desc:"20 min, extra gentle"},
    {id:"w4r4",tag:"Long run",desc:"3.5 mi slow"}]},
  5:{recovery:false,runs:[
    {id:"w5r1",tag:"Easy",desc:"25–30 min conversational"},
    {id:"w5r2",tag:"Intervals",desc:"4 × 800m @ 9:30/mi · 2 min rest"},
    {id:"w5r3",tag:"Easy",desc:"25–30 min conversational"},
    {id:"w5r4",tag:"Long run",desc:"4.5 mi slow"}]},
  6:{recovery:false,runs:[
    {id:"w6r1",tag:"Easy+Tempo",desc:"Easy run with 1 mi @ 10:00/mi inside"},
    {id:"w6r2",tag:"Intervals",desc:"4 × 800m @ 9:30/mi · 2 min rest"},
    {id:"w6r3",tag:"Easy",desc:"25–30 min conversational"},
    {id:"w6r4",tag:"Long run",desc:"5.0 mi slow"}]},
  7:{recovery:false,runs:[
    {id:"w7r1",tag:"Easy",desc:"30 min conversational"},
    {id:"w7r2",tag:"Intervals",desc:"5 × 800m @ 9:30/mi · 2 min rest"},
    {id:"w7r3",tag:"Easy",desc:"30 min conversational"},
    {id:"w7r4",tag:"Long run",desc:"5.5 mi slow"}]},
  8:{recovery:true,runs:[
    {id:"w8r1",tag:"Easy",desc:"20–25 min, extra gentle"},
    {id:"w8r2",tag:"Intervals",desc:"3 × 800m · easy week"},
    {id:"w8r3",tag:"Easy",desc:"20–25 min, extra gentle"},
    {id:"w8r4",tag:"Long run",desc:"4.5 mi slow"}]},
  9:{recovery:false,runs:[
    {id:"w9r1",tag:"Easy",desc:"30–35 min conversational"},
    {id:"w9r2",tag:"Intervals",desc:"3 × 1 mi @ 9:35–9:40/mi · 3 min rest"},
    {id:"w9r3",tag:"Easy",desc:"30–35 min conversational"},
    {id:"w9r4",tag:"Long run",desc:"6.0 mi slow"}]},
  10:{recovery:false,runs:[
    {id:"w10r1",tag:"Easy+Tempo",desc:"Easy run with 1.5 mi @ 10:00/mi inside"},
    {id:"w10r2",tag:"Intervals",desc:"3 × 1 mi @ goal pace · 3 min rest"},
    {id:"w10r3",tag:"Easy",desc:"30 min conversational"},
    {id:"w10r4",tag:"Long run",desc:"6.0 mi slow"}]},
  11:{recovery:false,runs:[
    {id:"w11r1",tag:"Intervals",desc:"2 × 1 mi @ goal pace, early in week"},
    {id:"w11r2",tag:"Easy",desc:"20 min conversational"},
    {id:"w11r3",tag:"Easy",desc:"20 min conversational"},
    {id:"w11r4",tag:"Time trial",desc:"5K all-out — target 31–32 min",milestone:true}]},
  12:{recovery:false,runs:[
    {id:"w12r1",tag:"Tuesday",desc:"4 × 400m @ goal pace — sharp, short"},
    {id:"w12r2",tag:"Thursday",desc:"20 min easy jog"},
    {id:"w12r3",tag:"Race day",desc:"5K — start 9:45/mi, kick the last mile 🏁",milestone:true}]},
};

const TOTAL = Object.values(PLAN).reduce((n,w)=>n+w.runs.length,0);
const KEY = "sub30-5k-progress";

let done = {};
try { done = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ done = {}; }

let openWeek = null;

function save(){
  try { localStorage.setItem(KEY, JSON.stringify(done)); } catch(e){}
}

function firstIncompleteWeek(){
  for (let w=1; w<=12; w++){
    if (PLAN[w].runs.some(r=>!done[r.id])) return w;
  }
  return 12;
}

function toggle(id){
  if (done[id]) delete done[id]; else done[id] = true;
  save();
  render();
}

function toggleWeek(wk){
  openWeek = (openWeek === wk) ? null : wk;
  render();
}

function resetAll(){
  if (!confirm("Clear all progress and start over?")) return;
  done = {};
  save();
  openWeek = 1;
  render();
}

function render(){
  const doneCount = Object.keys(done).length;
  const pct = Math.round(doneCount/TOTAL*100);
  const cur = firstIncompleteWeek();
  document.getElementById("count").textContent = doneCount + " / " + TOTAL + " runs";
  document.getElementById("pct").textContent = pct + "% · on week " + cur;
  document.getElementById("fill").style.width = pct + "%";

  let html = "";
  for (const phase of PHASES){
    html += `<section style="--ph:${phase.color}">`;
    html += `<div class="phase"><h2>${phase.name}</h2><span>${phase.note}</span></div>`;
    for (const wk of phase.weeks){
      const week = PLAN[wk];
      const wkDone = week.runs.filter(r=>done[r.id]).length;
      const complete = wkDone === week.runs.length;
      const isOpen = openWeek === wk;
      html += `<div class="week${week.recovery?" recovery":""}${complete?" complete":""}${isOpen?" open":""}">`;
      html += `<button class="week-head" onclick="toggleWeek(${wk})">`;
      html += `<span class="week-num">${complete?"✓":wk}</span>`;
      html += `<span class="week-info"><span class="week-title">Week ${wk}</span>`;
      if (week.recovery) html += `<span class="rec-tag">recovery</span>`;
      html += `<span class="week-sub">${wkDone}/${week.runs.length} runs done</span></span>`;
      html += `<span class="chev">${isOpen?"▲":"▼"}</span></button>`;
      html += `<div class="runs">`;
      for (const run of week.runs){
        const c = !!done[run.id];
        html += `<button class="run${run.milestone?" milestone":""}${c?" checked":""}" onclick="toggle('${run.id}')">`;
        html += `<span class="box">${c?"✓":""}</span>`;
        html += `<span><span class="run-tag">${run.tag}</span><span class="run-desc">${run.desc}</span></span>`;
        html += `</button>`;
      }
      html += `</div></div>`;
    }
    html += `</section>`;
  }
  document.getElementById("plan").innerHTML = html;
}

if (openWeek === null) openWeek = firstIncompleteWeek();
render();
</script>
</body>
</html>
